services:
  postgres:
    image: postgres:15-alpine
    container_name: agrisense-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - agrisense-network
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  influxdb:
    image: influxdb:2.7-alpine
    container_name: agrisense-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - agrisense-network
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  redis:
    image: redis:7-alpine
    container_name: agrisense-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - agrisense-network
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  emqx:
    image: emqx:5.3
    container_name: agrisense-emqx
    environment:
      EMQX_NAME: agrisense
      EMQX_HOST: 0.0.0.0
      EMQX_DEFAULT_USER: ${EMQX_ADMIN_USERNAME}
      EMQX_DEFAULT_PASSWORD: ${EMQX_ADMIN_PASSWORD}
    volumes:
      - emqx_data:/opt/emqx/data
    ports:
      - "1883:1883"
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - agrisense-network
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  api:
    image: ${BACKEND_IMAGE:-agrisense-api:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrisense-api
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      emqx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - agrisense-network
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  frontend:
    image: ${FRONTEND_IMAGE:-agrisense-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agrisense-frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agrisense-network
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: agrisense-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - agrisense-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  grafana:
    image: grafana/grafana:latest
    container_name: agrisense-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - agrisense-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

volumes:
  postgres_data:
  influxdb_data:
  redis_data:
  emqx_data:
  prometheus_data:
  grafana_data:

networks:
  agrisense-network:
    driver: bridge
