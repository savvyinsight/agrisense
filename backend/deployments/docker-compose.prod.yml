version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agrisense-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    networks:
      - agrisense-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    container_name: agrisense-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - agrisense-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agrisense-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - agrisense-network
    restart: unless-stopped

  emqx:
    image: emqx:5.3
    container_name: agrisense-emqx
    environment:
      EMQX_NAME: agrisense
      EMQX_HOST: 0.0.0.0
    volumes:
      - emqx_data:/opt/emqx/data
    networks:
      - agrisense-network
    ports:
      - "1883:1883"   # MQTT
      - "8083:8083"   # WebSocket
      - "18083:18083" # Dashboard
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.api
    container_name: agrisense-api
    environment:
      - ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - INFLUXDB_URL=http://influxdb:8086
      - MQTT_BROKER=tcp://emqx:1883
    env_file:
      - ../.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      influxdb:
        condition: service_started
      emqx:
        condition: service_started
    networks:
      - agrisense-network
    ports:
      - "8080:8080"
    restart: unless-stopped

  mqtt-handler:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.mqtt
    container_name: agrisense-mqtt
    environment:
      - ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - INFLUXDB_URL=http://influxdb:8086
      - MQTT_BROKER=tcp://emqx:1883
    env_file:
      - ../.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      influxdb:
        condition: service_started
      emqx:
        condition: service_started
    networks:
      - agrisense-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: agrisense-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - agrisense-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: agrisense-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - agrisense-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: agrisense-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - agrisense-network
    restart: unless-stopped

networks:
  agrisense-network:
    driver: bridge

volumes:
  postgres_data:
  influxdb_data:
  redis_data:
  emqx_data:
  prometheus_data:
  grafana_data:
