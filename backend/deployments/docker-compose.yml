version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agrisense-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agrisense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrisense-network

  influxdb:
    image: influxdb:2.7-alpine
    container_name: agrisense-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123
      DOCKER_INFLUXDB_INIT_ORG: my-org
      DOCKER_INFLUXDB_INIT_BUCKET: sensor_data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrisense-network

  redis:
    image: redis:7-alpine
    container_name: agrisense-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrisense-network

  emqx:
    image: emqx:5.3
    container_name: agrisense-emqx
    environment:
      EMQX_NAME: agrisense
      EMQX_HOST: 0.0.0.0
    ports:
      - "1883:1883"  # MQTT
      - "8083:8083"  # WebSocket
      - "8084:8084"  # WebSocket SSL
      - "18083:18083" # Dashboard
    volumes:
      - emqx_data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrisense-network

  # api:
  #   build:
  #     context: ..
  #     dockerfile: deployments/docker/Dockerfile.api
  #   container_name: agrisense-api
  #   environment:
  #     - ENV=development
  #     - DB_HOST=postgres
  #     - DB_PORT=5432
  #     - DB_USER=postgres
  #     - DB_PASSWORD=postgres
  #     - DB_NAME=agrisense
  #     - DB_SSL_MODE=disable
  #     - INFLUXDB_URL=http://influxdb:8086
  #     - INFLUXDB_TOKEN=my-token
  #     - INFLUXDB_ORG=my-org
  #     - INFLUXDB_BUCKET=sensor_data
  #     - REDIS_HOST=redis
  #     - REDIS_PORT=6379
  #     - REDIS_DB=0
  #     - MQTT_BROKER=tcp://emqx:1883
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_started
  #     influxdb:
  #       condition: service_started
  #     emqx:
  #       condition: service_started
  #   networks:
  #     - agrisense-network
  #   restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: agrisense-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - agrisense-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: agrisense-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - agrisense-network
    restart: unless-stopped

volumes:
  postgres_data:
  influxdb_data:
  redis_data:
  emqx_data:
  prometheus_data:
  grafana_data:

networks:
  agrisense-network:
    driver: bridge
