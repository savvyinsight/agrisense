name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      ref:
        description: 'Git ref (branch/tag) to deploy'
        required: true
        default: 'main'

  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.image-tags.outputs.backend-image }}
      frontend-image: ${{ steps.image-tags.outputs.frontend-image }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: image-tags
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          GIT_SHA=${{ github.sha }}
          GIT_REF=${{ github.ref_name }}

          BACKEND_TAG="${REGISTRY}/agrisense-api:${GIT_REF}-${GIT_SHA::7}"
          FRONTEND_TAG="${REGISTRY}/agrisense-frontend:${GIT_REF}-${GIT_SHA::7}"

          if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            BACKEND_TAG="${BACKEND_TAG}\n${REGISTRY}/agrisense-api:latest"
            FRONTEND_TAG="${FRONTEND_TAG}\n${REGISTRY}/agrisense-frontend:latest"
          fi

          echo "backend-image=${BACKEND_TAG}" >> $GITHUB_OUTPUT
          echo "frontend-image=${FRONTEND_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.image-tags.outputs.backend-image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.image-tags.outputs.frontend-image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Configure deployment credentials
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to remote server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend-image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend-image }}
          ENV_NAME: ${{ github.event.inputs.environment || 'production' }}
        run: |
          ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_HOST} << EOF
          set -e
          cd ${DEPLOY_PATH}

          # Pull latest config files (docker-compose.yml, nginx, prometheus configs)
          git pull origin main

          # Backup current env
          cp .env.prod .env.prod.backup

          # Pull pre-built images from GitHub Container Registry (ghcr.io)
          # No building on server — images are built in CI
          docker pull ${BACKEND_IMAGE}
          docker pull ${FRONTEND_IMAGE}

          # Pass image tags to docker compose
          export BACKEND_IMAGE=${BACKEND_IMAGE}
          export FRONTEND_IMAGE=${FRONTEND_IMAGE}

          # Deploy with pre-built images
          docker compose -f docker-compose.prod.yml down --remove-orphans
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          # Wait for services to be healthy
          sleep 10
          docker compose -f docker-compose.prod.yml ps

          # Run database migrations
          docker compose -f docker-compose.prod.yml exec -T api go run ./cmd/migrate up

          # Health check
          curl -f http://localhost:8080/health || exit 1
          echo "✅ Deployment successful"
          EOF

      - name: Verify deployment
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          for i in {1..30}; do
            if curl -f ${PROD_URL}/health; then
              echo "✅ API is healthy"
              exit 0
            fi
            echo "Waiting for API... (attempt $i/30)"
            sleep 2
          done
          echo "❌ API health check failed"
          exit 1

      - name: Notify deployment
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "✅ Deployment successful\nImage: ${{ needs.build-and-push.outputs.backend-image }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref
        continue-on-error: true

      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "❌ Deployment FAILED"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref
        continue-on-error: true

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release-notes
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "body=Initial release" >> $GITHUB_OUTPUT
          else
            # Generate changelog from commits between tags
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "## Changes since ${PREV_TAG}" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "## Docker Images" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "- Backend: \`ghcr.io/${{ github.repository_owner }}/agrisense-api:${{ github.ref_name }}\`" >> $GITHUB_OUTPUT
            echo "- Frontend: \`ghcr.io/${{ github.repository_owner }}/agrisense-frontend:${{ github.ref_name }}\`" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.release-notes.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
